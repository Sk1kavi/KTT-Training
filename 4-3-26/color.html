<html>
    <head>
        <style>
            body{
                background-image: conic-gradient(aqua,pink,violet,purple);
            }
            .box{
                background-image: url("../little-cat-sitting-grass.jpg");
                background-size: contain;
                background-repeat: no-repeat;
                background-position: right;
                background-color: hsl(150 50% 60%); 
                padding:10 10;
                margin: 70;
                border-style: double dotted;
                border-color: black;
                border-width: 10px;
                border-top-right-radius: 70px;
            }
            h1{
                color:darkblue !important;
            }
            .heading{
                color:white;
            }
            .box:has(h1,p){
                text-align: center;
                color:brown;
            }
            .linear{
                background-image: linear-gradient( to right,green 20%,blue 20% 40%,red 40% 60%,black 60% 80%,purple 80% 100%);
                width:calc(100% - 70px);
                height: 100;
                margin:20;
            }
            .repeat{
                background-image: repeating-radial-gradient(black 30px, white 40px);
                width:calc(100% - 70px);
                height: 100;
                margin-bottom: 30;
            }
            p{
                border: 2px dotted brown;
                color: blue !important;
                
            }
            em{
                border:inherit;
                border-left-width: 10px;
                border-right-width: 10px;
                margin-left: 20px;
                padding:10;
            }
            p{
                color: green !important;
            }
        </style>
    </head>
    <body>
        <div class=" box">
            <h1 class = "heading">Color and background properties</h1>
            <p> sample webpage to demonstrate different types of <em>color codes , padding , margin , border , has function selector list and class selector</em></p>
        </div>
        <div class="linear">

        </div>
        <div class="repeat">

        </div>
        
    </body>
    </html>
