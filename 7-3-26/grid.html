<html>
    <head>
        <style>
            nav{
                display:grid;
                background-color:antiquewhite;
                grid-template-columns: repeat(3, 1fr);
                gap:15px;
                
            }
            a{
                display: grid;
                place-items: center;
                background-color: aqua;
                color:black;
                text-decoration: none;
                text-transform: capitalize;
                padding:20px;
            }
            a:focus{
                background-color: lightcoral;
            }
            a:hover{
                padding: 20px;
                font-size:20px;
                background-color: lightgreen;
            }
            a:visited{
                background-color:plum;
            }
            a[href*=list]{
                grid-row:5;
            }
            a[href*=text]{
                grid-row: 3;
                grid-column:3;
            }
             a[href*=font] + a[href*=link]{
                grid-row: 5;
            }
             a[href*=back]{
                grid-row: 1 / span 3;
            }
             a[href*=write]{
                grid-row: 2 / span 3;
            }
             a[href*=box]{
                grid-row:5;
            }
            a[href*=grid]{

                grid-column: 1 / 4;
            }
        </style>
    </head>

        </nav>

</html>
